<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Pro | Admin Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-admin.svg">
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <style>
        /* Modern Apple-style Glassmorphic Theme */
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(26, 26, 28, 0.6);
            --amber-start: #FF7B00;
            --amber-end: #FFB000;
            --text-main: #F5F5F7;
            --text-muted: #86868B;
            --border-light: rgba(255, 255, 255, 0.08);
            --amber-glow: rgba(255, 123, 0, 0.15);
            --danger: #FF453A;
            --success: #32D74B;
            --cancel: #FF9F0A;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(255,123,0,0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255,176,0,0.05), transparent 40%);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-light);
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            box-sizing: border-box;
            z-index: 10;
        }
        
        .sidebar h2 {
            margin: 0 0 40px 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.5rem;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 16px 30px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, var(--amber-start), var(--amber-end));
            transform: scaleY(0);
            transition: transform 0.3s ease;
            transform-origin: center;
        }

        .nav-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-btn.active {
            color: #fff;
            background: linear-gradient(90deg, var(--amber-glow) 0%, transparent 100%);
        }

        .nav-btn.active::before {
            transform: scaleY(1);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 50px 80px;
            width: calc(100% - 260px);
            box-sizing: border-box;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        h1 { margin: 0; font-weight: 600; font-size: 2.5rem; letter-spacing: -1px; }

        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-light);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .btn-amber {
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            color: #000;
            border: none;
        }

        .btn-amber:hover {
            box-shadow: 0 5px 20px rgba(255, 123, 0, 0.4);
            background: linear-gradient(135deg, #FF8C19, #FFB819);
        }

        .btn-danger { color: var(--danger); border-color: rgba(255,69,58,0.3); }
        .btn-danger:hover { background: rgba(255,69,58,0.1); border-color: var(--danger); }

        /* Sync Indicator */
        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--success);
            background: rgba(50, 215, 75, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(50, 215, 75, 0.2);
        }
        .sync-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(50, 215, 75, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(50, 215, 75, 0); }
            100% { box-shadow: 0 0 0 0 rgba(50, 215, 75, 0); }
        }

        /* Grid & Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 123, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 40px var(--amber-glow);
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.4rem; font-weight: 600; }
        .card p { margin: 8px 0; font-size: 0.95rem; color: var(--text-muted); }
        .card strong { color: var(--text-main); font-weight: 500; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            align-self: flex-start;
            border: 1px solid transparent;
        }
        
        .status-pending { background: rgba(255, 176, 0, 0.1); color: var(--amber-end); border-color: rgba(255, 176, 0, 0.2); }
        .status-active { background: rgba(50, 215, 75, 0.1); color: var(--success); border-color: rgba(50, 215, 75, 0.2); }
        .status-rejected { background: rgba(255, 69, 58, 0.1); color: var(--danger); border-color: rgba(255, 69, 58, 0.2); }
        .status-cancelled { background: rgba(255, 159, 10, 0.1); color: var(--cancel); border-color: rgba(255, 159, 10, 0.2); }
        .status-completed { background: rgba(255, 255, 255, 0.05); color: #fff; border-color: var(--border-light); }

        .card-actions {
            margin-top: auto;
            padding-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid var(--border-light);
        }

        .card-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
            color: var(--text-main);
            white-space: nowrap;
        }

        .card-actions button:hover { background: rgba(255,255,255,0.1); }
        
        .action-approve { border-color: rgba(50, 215, 75, 0.3) !important; color: var(--success) !important; }
        .action-approve:hover { background: rgba(50, 215, 75, 0.1) !important; border-color: var(--success) !important; }

        .action-reject { border-color: rgba(255, 69, 58, 0.3) !important; color: var(--danger) !important; }
        .action-reject:hover { background: rgba(255, 69, 58, 0.1) !important; border-color: var(--danger) !important; }

        .action-amber { border-color: rgba(255, 123, 0, 0.4) !important; color: var(--amber-end) !important; }
        .action-amber:hover { background: rgba(255, 123, 0, 0.1) !important; border-color: var(--amber-start) !important; }

        /* Login Modal Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }

        .login-box {
            background: var(--bg-card);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            text-align: center;
            width: 320px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 25px 0;
            border-radius: 14px;
            border: 1px solid var(--border-light);
            background: rgba(0,0,0,0.5);
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .login-box input:focus { border-color: var(--amber-start); }
        .login-box button { width: 100%; }

        /* Manage Modal */
        #manage-modal {
            position: fixed; top: 0; left: 0; width: 100% ; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }

        .modal-body {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--border-light);
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-item {
            margin-bottom: 25px;
        }

        .modal-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .modal-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: rgba(0,0,0,0.4);
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        .modal-input:focus { border-color: var(--amber-start); }

    </style>
</head>
<body>

    <!-- Simple Auth Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-top: 0;">Admin <span class="text-gradient">Access</span></h2>
            <div style="position: relative;">
                <input type="password" id="admin-pass" placeholder="Enter password (01270101)" style="padding-right: 50px;">
                <button id="biometric-btn" onclick="loginWithBiometrics()" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; padding: 5px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--amber-start)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <button class="btn btn-amber" onclick="login()" style="width: 100%; margin-top: 15px;">Enter Dashboard</button>
            <p id="login-error" style="color:var(--danger); display:none; font-size: 0.85rem; margin-top:15px;">Incorrect password.</p>
        </div>
    </div>

    <!-- Manage Modal -->
    <div id="manage-modal" style="display: none;">
        <div class="modal-body">
            <h2 style="margin-top: 0; margin-bottom: 30px;">Manage Project <span id="m-p-id" class="text-gradient">---</span></h2>
            
            <div class="modal-item">
                <label class="modal-label">Post New Status Update</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="m-update-msg" class="modal-input" placeholder="e.g. Filming has started!">
                    <button class="btn btn-amber" onclick="postUpdate()">Post</button>
                </div>
            </div>

            <div class="modal-item">
                <label class="modal-label">Configure Deliverables</label>
                <div id="m-deliverables-list" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px;">
                    <!-- Deliverable rows -->
                </div>
                <button class="btn" style="width: 100%; border-style: dashed;" onclick="addDeliverableRow()">+ Add Deliverable Row</button>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 40px; border-top: 1px solid var(--border-light); padding-top: 30px;">
                <button class="btn btn-amber" style="flex:2" onclick="saveProjectChanges()">Save All Changes</button>
                <button class="btn" style="flex:1" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Visual <span class="text-gradient">Pro</span></h2>
        <button class="nav-btn active" data-view="Pending">Pending Requests</button>
        <button class="nav-btn" data-view="Active">Active Projects</button>
        <button class="nav-btn" data-view="Completed">Completed Projects</button>
        <button class="nav-btn" data-view="Rejected">Rejected</button>
        <button class="nav-btn" data-view="Cancelled">Cancelled</button>
    </div>

    <!-- Main Engine -->
    <div class="main-content">
        <div class="header-actions">
            <h1 id="view-title">Pending Requests</h1>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="sync-indicator" id="sync-status">
                    <div class="sync-dot"></div> Live Sync
                </div>
                <button class="btn btn-danger" onclick="bulkDelete()">Delete View</button>
            </div>
        </div>

        <div id="loading" style="display:none; color: var(--text-muted); font-size: 1.1rem;">Loading project data...</div>
        <div class="cards-grid" id="cards-container">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <script>
        let currentView = 'Pending';
        let allProjects = [];
        let sseConnection = null;
        let selectedProjectId = null;

        // Check for biometric support on load
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.PublicKeyCredential) {
                const res = await fetch('/api/admin/auth/login-options');
                if (res.ok) {
                    document.getElementById('biometric-btn').style.display = 'flex';
                }
            }
        });

        // Auth
        const login = async () => {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '01270101') { 
                document.getElementById('login-overlay').style.display = 'none';
                fetchData();
                initSSE();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        };

        const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;

        const loginWithBiometrics = async () => {
            try {
                const optionsRes = await fetch('/api/admin/auth/login-options');
                if (!optionsRes.ok) throw new Error('No finger registered.');
                const options = await optionsRes.json();
                const asseResp = await startAuthentication(options);

                const verifyRes = await fetch('/api/admin/auth/login-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(asseResp),
                });

                const verification = await verifyRes.json();
                if (verification.verified) {
                    document.getElementById('login-overlay').style.display = 'none';
                    fetchData();
                    initSSE();
                }
            } catch (err) { alert(err.message); }
        };

        const initSSE = () => {
            if (sseConnection) return;
            sseConnection = new EventSource('/api/events');
            sseConnection.addEventListener('project_updated', () => fetchData());
            sseConnection.addEventListener('project_received', () => fetchData());
            sseConnection.addEventListener('project_deleted', () => fetchData());
            sseConnection.onerror = () => {
                 document.getElementById('sync-status').innerHTML = '<span style="color:var(--danger)">Offline</span>';
            };
        };

        // Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentView = e.target.getAttribute('data-view');
                document.getElementById('view-title').textContent = e.target.textContent;
                renderCards();
            });
        });

        const fetchData = async () => {
            try {
                const res = await fetch('/api/admin/projects', { headers: { 'Authorization': 'Bearer 01270101' } });
                if(res.ok) {
                    allProjects = await res.json();
                    renderCards();
                }
            } catch (err) { console.error(err); }
        };

        const getStatusClass = (status) => {
            if (['Request Submitted', 'Request Under Review'].includes(status)) return 'status-pending';
            if (['Project Completed'].includes(status)) return 'status-completed';
            if (['Project Rejected'].includes(status)) return 'status-rejected';
            return 'status-active';
        };

        const belongsToView = (p, view) => {
            if (view === 'Pending') return ['Request Submitted', 'Request Under Review'].includes(p.status);
            if (view === 'Active') return !['Request Submitted', 'Request Under Review', 'Project Completed', 'Project Rejected', 'Project Cancelled'].includes(p.status);
            if (view === 'Completed') return p.status === 'Project Completed';
            if (view === 'Rejected') return p.status === 'Project Rejected';
            if (view === 'Cancelled') return p.status === 'Project Cancelled';
            return false;
        };

        const NEXT_STEPS = {
            'Request Submitted': 'Request Under Review',
            'Request Under Review': 'Project Accepted',
            'Project Accepted': 'Meeting Scheduled',
            'Meeting Scheduled': 'Deposit Required',
            'Deposit Required': 'Project Started',
            'Project Started': 'Filming In Progress',
            'Filming In Progress': 'Editing In Progress',
            'Editing In Progress': 'Final Review',
            'Final Review': 'Final Payment Required',
            'Final Payment Required': 'Project Completed'
        };

        const renderCards = () => {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            const filtered = allProjects.filter(p => belongsToView(p, currentView));
            filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

            if (filtered.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted);">No projects here.</p>`;
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                const nextStep = NEXT_STEPS[p.status];
                
                let actionsHTML = '';
                if (nextStep) {
                    // We remove onclick and use event listener for more reliability
                    actionsHTML += `<button class="action-amber">Move to ${nextStep}</button>`;
                }
                if (currentView === 'Active' || currentView === 'Completed') {
                    actionsHTML += `<button class="action-approve" onclick="openManagePortal('${p.id}')">Manage Portal</button>`;
                }
                if (currentView === 'Pending') {
                    actionsHTML += `<button class="action-reject" onclick="updateStatus('${p.id}', 'Project Rejected')">Reject</button>`;
                }
                actionsHTML += `<button onclick="deleteProject('${p.id}')">Delete</button>`;

                    <div class="card-actions">${actionsHTML}</div>
                `;
                
                // Add event listener to the "Move to" button if it exists
                const moveBtn = card.querySelector('.action-amber');
                if (moveBtn) {
                    moveBtn.addEventListener('click', () => advanceStep(p.id, NEXT_STEPS[p.status], moveBtn));
                }
                
                container.appendChild(card);
            });
        };

        const advanceStep = async (id, next, btn) => {
            let payload = { status: next };
            if (next === 'Project Accepted') {
                const price = prompt('Enter Total Project Price ($):');
                if (!price) return;
                payload.price = parseFloat(price);
            }
            if(!confirm(`Proceed with: ${next}?`)) return;
            
            if (btn) {
                const originalText = btn.textContent;
                btn.textContent = 'Updating...';
                btn.disabled = true;
                await updateProject(id, payload);
                btn.textContent = originalText;
                btn.disabled = false;
            } else {
                await updateProject(id, payload);
            }
        };

        const openManagePortal = (id) => {
            selectedProjectId = id;
            const p = allProjects.find(pro => pro.id === id);
            document.getElementById('m-p-id').textContent = id;
            document.getElementById('manage-modal').style.display = 'flex';
            
            const list = document.getElementById('m-deliverables-list');
            list.innerHTML = '';
            (p.deliverables || []).forEach(d => addDeliverableRow(d.label, d.url));
            if (!(p.deliverables && p.deliverables.length)) addDeliverableRow();
        };

        const closeModal = () => document.getElementById('manage-modal').style.display = 'none';

        const addDeliverableRow = (l = '', u = '') => {
            const div = document.createElement('div');
            div.style = "display:flex; gap:10px;";
            div.innerHTML = `
                <input type="text" placeholder="Label" value="${l}" class="d-label modal-input" style="flex:1">
                <input type="text" placeholder="URL" value="${u}" class="d-url modal-input" style="flex:2">
                <button class="btn btn-danger" onclick="this.parentElement.remove()">×</button>
            `;
            document.getElementById('m-deliverables-list').appendChild(div);
        };

        const postUpdate = async () => {
            const msg = document.getElementById('m-update-msg').value;
            if (!msg) return;
            await updateProject(selectedProjectId, { newUpdate: msg });
            document.getElementById('m-update-msg').value = '';
            alert('Update posted!');
        };

        const saveProjectChanges = async () => {
            const delivs = Array.from(document.querySelectorAll('#m-deliverables-list > div')).map(row => ({
                label: row.querySelector('.d-label').value,
                url: row.querySelector('.d-url').value,
                type: 'video'
            })).filter(d => d.label && d.url);

            await updateProject(selectedProjectId, { deliverables: delivs });
            alert('Settings Saved');
            closeModal();
        };

        const updateProject = async (id, payload) => {
            try {
                const res = await fetch(`/api/admin/projects/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 01270101' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    await fetchData(); // Force refresh the dashboard grid
                    console.log(`✅ Project ${id} updated successfully to: ${payload.status}`);
                } else {
                    const error = await res.json();
                    alert('Update failed: ' + (error.message || error.error));
                }
            } catch (err) { 
                console.error('Update Request Error:', err);
                alert('Update Failed - Connection Error'); 
            }
        };

        const updateStatus = async (id, status) => {
             if (status === 'Project Rejected') {
                const r = prompt('Reason:');
                if (r === null) return;
                await updateProject(id, { status, rejectionReason: r });
            } else {
                if(confirm(`Set to ${status}?`)) await updateProject(id, { status });
            }
        };

        const deleteProject = async (id) => {
            if(confirm('Delete permanently?')) {
                await fetch(`/api/admin/projects/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer 01270101' } });
            }
        };

        const bulkDelete = async () => {
             if(confirm(`Delete ALL in ${currentView}?`)) {
                const filtered = allProjects.filter(p => belongsToView(p, currentView));
                for(let p of filtered) await fetch(`/api/admin/projects/${p.id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer 01270101' } });
            }
        };

    </script>
</body>
</html>
