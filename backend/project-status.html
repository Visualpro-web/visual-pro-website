<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Pro | Client Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-client.svg">
    <style>
        /* Apple-inspired Cinematic Theme */
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(26, 26, 28, 0.6);
            --bg-card-hover: rgba(40, 40, 45, 0.8);
            --amber-start: #FF7B00;
            --amber-end: #FFB000;
            --text-main: #F5F5F7;
            --text-muted: #86868B;
            --border-light: rgba(255, 255, 255, 0.08);
            --success: #32D74B;
            --error: #FF453A;
            --amber-glow: rgba(255, 123, 0, 0.15);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(255,123,0,0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255,176,0,0.05), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }

        /* Profile Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--amber-start);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--amber-start);
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 8px 24px rgba(255, 123, 0, 0.2);
            object-fit: cover;
        }

        .profile-name { font-size: 1.5rem; font-weight: 600; margin-bottom: 5px; }
        .profile-email { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-logout:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* Main Area */
        .main-area { width: 100%; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* Projects List Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .project-card:hover {
            transform: translateY(-5px);
            background: var(--bg-card-hover);
            border-color: rgba(255,123,0,0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .p-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 5px; }
        .p-id { font-size: 0.8rem; color: var(--amber-start); font-family: monospace; }
        
        .p-status {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
        }

        .p-status.completed { background: rgba(50, 215, 75, 0.1); border-color: var(--success); color: var(--success); }
        .p-status.active { background: rgba(255, 123, 0, 0.1); border-color: var(--amber-start); color: var(--amber-start); }

        /* Detail View specific styles (migrated from old project-status) */
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 24px; padding: 30px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card-title { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .card-title svg { color: var(--amber-start); }
        
        .overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .overview-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .overview-value { font-size: 1.1rem; font-weight: 500; }
        
        .tracker { display: flex; flex-direction: column; gap: 20px; position: relative; padding-left: 5px; }
        .tracker::before { content: ''; position: absolute; top: 15px; bottom: 15px; left: 20px; width: 2px; background: var(--border-light); z-index: 0; }
        .step { display: flex; align-items: center; position: relative; z-index: 1; opacity: 0.4; transition: all 0.5s; }
        .step.completed { opacity: 0.8; }
        .step.active { opacity: 1; transform: translateX(5px); }
        .step-indicator { width: 32px; height: 32px; border-radius: 50%; background: #111; border: 2px solid var(--border-light); display: flex; align-items: center; justify-content: center; margin-right: 20px; flex-shrink: 0; }
        .step.completed .step-indicator { background: rgba(50, 215, 75, 0.1); border-color: var(--success); color: var(--success); }
        .step.active .step-indicator { background: linear-gradient(135deg, rgba(255,123,0,0.1), rgba(255,176,0,0.1)); border-color: var(--amber-start); color: var(--amber-end); box-shadow: 0 0 15px rgba(255,123,0,0.3); }
        .step-label { font-size: 1.05rem; font-weight: 600; }

        .updates-timeline { display: flex; flex-direction: column; gap: 20px; }
        .update-entry { display: flex; gap: 15px; padding-bottom: 20px; border-bottom: 1px solid var(--border-light); }
        .update-entry:last-child { border-bottom: none; }
        .update-time { font-size: 0.85rem; color: var(--text-muted); min-width: 80px; padding-top: 2px; }

        .payment-btn { width: 100%; padding: 16px; border-radius: 16px; background: linear-gradient(135deg, var(--amber-start), var(--amber-end)); color: #000; border: none; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .payment-btn:hover { box-shadow: 0 10px 25px rgba(255,123,0,0.4); }
        .payment-status { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-muted); margin-top: 12px; }

        /* Downloads Gallery */
        .deliverables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .deliverable-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); border-radius: 18px; overflow: hidden; position: relative; }
        .deliverable-preview { height: 160px; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border-light); background-size: cover; background-position: center; }
        .deliverable-info { padding: 15px; }
        .deliverable-title { font-weight: 600; display: block; margin-bottom: 5px; }
        .download-btn { margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; display: flex; justify-content: center; font-size: 0.9rem; }
        .download-btn:hover { background: var(--amber-start); color: #000; border-color: transparent; }
        .locked-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; padding: 20px; }

        /* Back Button */
        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--amber-start);
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--amber-start); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <div class="dashboard-container" id="dashboard" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="profile-card">
                <div id="client-avatar" class="profile-avatar"></div>
                <h2 id="client-name" class="profile-name">---</h2>
                <div id="client-email" class="profile-email">---</div>
                <button class="btn-logout" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <!-- Main Area: Projects List -->
        <div class="main-area" id="view-list">
            <h1 class="section-title">My Projects</h1>
            <div id="projects-grid" class="projects-grid">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Main Area: Project Detail -->
        <div class="main-area" id="view-detail" style="display: none;">
            <div class="back-nav" onclick="closeDetail()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Projects
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 300px; gap:30px;">
                <!-- Main Col -->
                <div>
                    <!-- Deliverables -->
                    <div class="card">
                        <div class="card-header"><div class="card-title">Project Deliverables</div></div>
                        <div class="deliverables-grid" id="deliverables-container"></div>
                    </div>

                    <!-- Updates -->
                    <div class="card">
                        <div class="card-header"><div class="card-title">Project Updates</div></div>
                        <div class="updates-timeline" id="updates-container"></div>
                    </div>
                </div>

                <!-- Side Col -->
                <div>
                    <!-- Payment -->
                    <div class="card" style="background: linear-gradient(135deg, rgba(40,40,42,0.6), rgba(20,20,22,0.6))">
                        <div class="card-title">Payment Status</div>
                        <span id="p-price" style="font-size: 2rem; font-weight: 700; margin:10px 0; display:block;">$0.00</span>
                        <div id="payment-actions"></div>
                    </div>
                    
                    <!-- Tracker -->
                    <div class="card">
                        <div class="card-title" style="margin-bottom: 25px;">Project Tracker</div>
                        <div class="tracker" id="tracker-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STEPS = [
            'Request Submitted', 'Request Under Review', 'Project Accepted', 
            'Meeting Scheduled', 'Deposit Required', 'Project Started', 
            'Filming In Progress', 'Editing In Progress', 'Final Review', 
            'Final Payment Required', 'Project Completed'
        ];

        let globalProjects = [];

        async function initDashboard() {
            const token = localStorage.getItem('vp_token');
            if (!token) { window.location.href = '/portal'; return; }

            try {
                // Fetch Profile
                const profileRes = await fetch('/api/client/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!profileRes.ok) { localStorage.removeItem('vp_token'); window.location.href = '/portal'; return; }
                const user = await profileRes.json();
                
                document.getElementById('client-name').textContent = user.name;
                document.getElementById('client-email').textContent = user.email;
                const avatarEl = document.getElementById('client-avatar');
                if(user.profileImage) avatarEl.innerHTML = `<img src="${user.profileImage}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.onerror=null; this.parentElement.innerHTML='${user.name.charAt(0).toUpperCase()}';">`;
                else avatarEl.innerHTML = user.name.charAt(0).toUpperCase();

                // Fetch Projects
                const projRes = await fetch('/api/client/projects', { headers: { 'Authorization': `Bearer ${token}` } });
                globalProjects = await projRes.json();
                renderProjectsList();

                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';

            } catch(e) { console.error(e); }
        }

        function renderProjectsList() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            
            if(globalProjects.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted);">No projects found. Submit a request on our home page!</p>';
                return;
            }

            globalProjects.forEach((p, index) => {
                const isCompleted = p.status === 'Project Completed';
                const isActive = p.status !== 'Project Completed' && p.status !== 'Project Rejected';

                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => openDetail(index);
                card.innerHTML = `
                    <div class="project-card-header">
                        <div>
                            <div class="p-title">${p.projectTitle || p.name}</div>
                            <div class="p-id">${p.id}</div>
                        </div>
                    </div>
                    <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:10px;">${p.projectType || 'Cinematic Video Production'}</div>
                    <div class="p-status ${isCompleted ? 'completed' : isActive ? 'active' : ''}">${p.status}</div>
                `;
                grid.appendChild(card);
            });
        }

        function openDetail(index) {
            const p = globalProjects[index];
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';

            // Prices
            const basePrice = p.price || 0;
            const discount = p.discount || 0;
            const effectivePrice = Math.max(0, basePrice - discount);
            
            let priceHtml = `$${basePrice.toLocaleString()}`;
            if (discount > 0) {
                priceHtml = `<span style="text-decoration:line-through; font-size:1.2rem; color:var(--text-muted); margin-right:10px;">$${basePrice.toLocaleString()}</span> <span style="color:var(--success)">$${effectivePrice.toLocaleString()}</span>`;
            }
            document.getElementById('p-price').innerHTML = priceHtml;
            
            // Payment Actions
            const payActions = document.getElementById('payment-actions');
            if (p.finalPaid) {
                payActions.innerHTML = `<div class="payment-status" style="color:var(--success)"><strong>Project Fully Paid</strong></div>`;
            } else if (!p.depositPaid) {
                 payActions.innerHTML = `<button class="payment-btn" onclick="startCheckout('${p.id}', 'deposit')">Pay 50% Deposit ($${(effectivePrice/2).toLocaleString()})</button>`;
            } else if (p.status === 'Final Payment Required' || STEPS.indexOf(p.status) >= 8) {
                payActions.innerHTML = `<button class="payment-btn" onclick="startCheckout('${p.id}', 'final')">Pay Final Balance ($${(effectivePrice/2).toLocaleString()})</button>`;
            } else {
                payActions.innerHTML = `<div class="payment-status" style="color:var(--amber-end)"><strong>Deposit Paid ($${(effectivePrice/2).toLocaleString()})</strong></div>`;
            }

            // Tracker
            const tracker = document.getElementById('tracker-container');
            tracker.innerHTML = '';
            let activeIdx = Math.max(0, STEPS.indexOf(p.status));
            STEPS.forEach((step, idx) => {
                const el = document.createElement('div');
                el.className = `step ${idx < activeIdx ? 'completed' : (idx === activeIdx ? 'active' : '')}`;
                const icon = idx < activeIdx ? `<div class="step-indicator" style="border-color:var(--success); color:var(--success)">✓</div>` : (idx === activeIdx ? `<div class="step-indicator" style="border-color:var(--amber-start); color:var(--amber-start)">●</div>` : `<div class="step-indicator"></div>`);
                el.innerHTML = `${icon}<span class="step-label">${step}</span>`;
                tracker.appendChild(el);
            });

            // Deliverables
            const container = document.getElementById('deliverables-container');
            if (!p.finalPaid) {
                container.innerHTML = `<div class="locked-overlay" style="position:relative; width:100%; height:150px; border-radius:15px; display:flex; align-items:center; justify-content:center; text-align:center;"><span class="locked-msg" style="padding:0 20px;">Final payment required to access your files.</span></div>`;
            } else if (p.deliverables && p.deliverables.length > 0) {
                container.innerHTML = '';
                p.deliverables.forEach(d => {
                    const card = document.createElement('div');
                    card.className = 'deliverable-card';
                    card.innerHTML = `
                        <div class="deliverable-info">
                            <span class="deliverable-title">${d.label}</span>
                            <div style="font-size:0.8rem; color:var(--text-muted)">${d.size || 'File'}</div>
                            <a href="${d.url}" download class="download-btn">Download File</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p style="color:var(--text-muted);">No deliverables uploaded yet.</p>';
            }

            // Updates
            const updatesBox = document.getElementById('updates-container');
            updatesBox.innerHTML = '';
            const revUpdates = [...(p.updates || [])].reverse();
            if(revUpdates.length === 0) updatesBox.innerHTML = '<p style="color:var(--text-muted);">No updates yet.</p>';
            else revUpdates.forEach(u => {
                const d = new Date(u.timestamp).toLocaleDateString();
                updatesBox.innerHTML += `<div class="update-entry"><div class="update-time">${d}</div><div class="update-msg">${u.message}</div></div>`;
            });
        }

        function closeDetail() {
            document.getElementById('view-detail').style.display = 'none';
            document.getElementById('view-list').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('vp_token');
            window.location.href = '/portal';
        }

        async function startCheckout(id, type) {
            try {
                const res = await fetch('/api/create-checkout-session', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectId: id, type })
                });
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                } else if (data.error) {
                    alert('Checkout Error: ' + data.error);
                }
            } catch (err) { alert('Stripe Error: ' + err.message); }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
