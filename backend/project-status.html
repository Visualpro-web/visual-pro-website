<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Pro | Client Portal</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-client.svg">
    <style>
        /* Apple-inspired Cinematic Theme */
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(26, 26, 28, 0.6);
            --amber-start: #FF7B00;
            --amber-end: #FFB000;
            --text-main: #F5F5F7;
            --text-muted: #86868B;
            --border-light: rgba(255, 255, 255, 0.08);
            --success: #32D74B;
            --danger: #FF453A;
            --warning: #FF9F0A;
            --amber-glow: rgba(255, 123, 0, 0.15);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(255,123,0,0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255,176,0,0.05), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        /* Top Header */
        .portal-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-weight: 700; font-size: 2.22rem; letter-spacing: -1px; }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(50, 215, 75, 0.1);
            color: var(--success);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(50, 215, 75, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .live-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(50, 215, 75, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(50, 215, 75, 0); }
            100% { box-shadow: 0 0 0 0 rgba(50, 215, 75, 0); }
        }

        /* Cards and Sections */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title svg {
            color: var(--amber-start);
        }

        /* Project Overview Table */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .overview-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .overview-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .overview-value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Progress Tracker */
        .tracker {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            padding-left: 5px;
        }

        .tracker::before {
            content: '';
            position: absolute;
            top: 15px;
            bottom: 15px;
            left: 20px;
            width: 2px;
            background: var(--border-light);
            z-index: 0;
        }

        .step {
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1;
            opacity: 0.4;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .step.completed { opacity: 0.8; }
        .step.active { opacity: 1; transform: translateX(5px); }

        .step-indicator {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #111;
            border: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
            transition: all 0.5s ease;
        }

        .step.completed .step-indicator {
            background: rgba(50, 215, 75, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .step.active .step-indicator {
            background: linear-gradient(135deg, rgba(255, 123, 0, 0.1), rgba(255, 176, 0, 0.1));
            border-color: var(--amber-start);
            color: var(--amber-end);
            box-shadow: 0 0 15px rgba(255, 123, 0, 0.3);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px var(--amber-glow); }
            to { box-shadow: 0 0 20px var(--amber-glow); }
        }

        .step-label { font-size: 1.05rem; font-weight: 600; }

        /* Payment Section */
        .payment-card {
            background: linear-gradient(135deg, rgba(40, 40, 42, 0.6), rgba(20, 20, 22, 0.6));
        }

        .price-tag {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 10px 0;
            display: block;
        }

        .payment-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            color: #000;
            border: none;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .payment-btn:hover {
            box-shadow: 0 10px 25px rgba(255, 123, 0, 0.4);
            transform: translateY(-2px);
        }

        .payment-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 12px;
        }

        /* Project Updates */
        .updates-timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .update-entry {
            display: flex;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .update-entry:last-child { border-bottom: none; }

        .update-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            min-width: 80px;
            padding-top: 2px;
        }

        .update-msg {
            font-size: 1rem;
            line-height: 1.4;
        }

        /* Deliverables gallery */
        .deliverables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .deliverable-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .deliverable-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 123, 0, 0.3);
            transform: translateY(-5px);
        }

        .deliverable-preview {
            height: 160px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-light);
            background-size: cover;
            background-position: center;
        }

        .deliverable-info {
            padding: 15px;
        }

        .deliverable-title {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        .deliverable-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
        }

        .download-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--amber-start);
            color: #000;
            border-color: transparent;
        }

        .locked-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .locked-msg {
            color: #fff;
            font-weight: 600;
            margin-top: 15px;
        }

        /* Notifications */
        .notification-badge {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--amber-start);
            color: #000;
            padding: 15px 25px;
            border-radius: 40px;
            font-weight: 600;
            box-shadow: 0 15px 35px rgba(255, 123, 0, 0.4);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--amber-start);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-muted); font-weight: 500;">Entering Secure Portal...</p>
    </div>

    <div class="dashboard-container" id="dashboard" style="display: none;">
        <!-- Header -->
        <div class="portal-header">
            <h1>Visual <span class="text-gradient">Pro</span> Portal</h1>
            <div class="live-badge" id="sse-indicator">
                <div class="live-dot"></div> Live Sync
            </div>
        </div>

        <!-- Main Column -->
        <div class="main-col">
            <!-- Project Overview -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        Project Overview
                    </div>
                </div>
                <div class="overview-grid">
                    <div class="overview-item">
                        <span class="overview-label">Project ID</span>
                        <span class="overview-value text-gradient" id="p-id">VP-####</span>
                    </div>
                    <div class="overview-item">
                        <span class="overview-label">Client Name</span>
                        <span class="overview-value" id="p-client">---</span>
                    </div>
                    <div class="overview-item">
                        <span class="overview-label">Project Type</span>
                        <span class="overview-value" id="p-type">---</span>
                    </div>
                    <div class="overview-item">
                        <span class="overview-label">Location</span>
                        <span class="overview-value" id="p-location">---</span>
                    </div>
                </div>
            </div>

            <!-- Deliverables -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Final Deliverables
                    </div>
                </div>
                <div class="deliverables-grid" id="deliverables-container">
                    <!-- Dynamic -->
                </div>
            </div>

            <!-- Project Updates -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-14 8.38 8.38 0 0 1 3.8.9L21 3z"></path></svg>
                        Project Updates
                    </div>
                </div>
                <div class="updates-timeline" id="updates-container">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>

        <!-- Sidebar Column -->
        <div class="side-col">
            <!-- Payment Section -->
            <div class="card payment-card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                    Payment Status
                </div>
                <p class="overview-label" style="margin-top: 20px;">Total Project Value</p>
                <span class="price-tag" id="p-price">$0.00</span>
                
                <div id="payment-actions">
                    <!-- Deposit, Final Pay, or Fully Paid Injected here -->
                </div>
            </div>

            <!-- Status Tracker -->
            <div class="card">
                <div class="card-title" style="margin-bottom: 30px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Project Tracker
                </div>
                <div class="tracker" id="tracker-container">
                    <!-- Dynamic steps -->
                </div>
            </div>
        </div>
    </div>

    <div class="notification-badge" id="notification">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span>New update available!</span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentProjectData = null;
        let sseConnection = null;

        const STEPS = [
            'Request Submitted',
            'Request Under Review',
            'Project Accepted',
            'Meeting Scheduled',
            'Deposit Required',
            'Project Started',
            'Filming In Progress',
            'Editing In Progress',
            'Final Review',
            'Final Payment Required',
            'Project Completed'
        ];

        const fetchProject = async () => {
            if (!projectId) {
                window.location.href = '/track-project';
                return;
            }

            try {
                const res = await fetch(`/api/client-portal/${projectId}`);
                if (res.ok) {
                    const data = await res.json();
                    
                    // Logic for detecting "New Update"
                    if (currentProjectData && JSON.stringify(data.updates) !== JSON.stringify(currentProjectData.updates)) {
                        showNotification();
                    }

                    currentProjectData = data;
                    renderDashboard(data);
                    
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('dashboard').style.display = 'grid';
                    }, 500);

                    initSSE();
                } else {
                    alert('Session expired or project unauthorized.');
                    window.location.href = '/track-project';
                }
            } catch (err) {
                console.error(err);
            }
        };

        const initSSE = () => {
            if (sseConnection) return;
            sseConnection = new EventSource('/api/events');
            
            sseConnection.addEventListener('project_updated', (e) => {
                const data = JSON.parse(e.data);
                if (data.id === projectId) {
                    console.log('Real-time sync triggered.');
                    fetchProject();
                }
            });

            sseConnection.onerror = () => {
                const status = document.getElementById('sse-indicator');
                status.innerHTML = '<span style="color:var(--danger)">Offline</span>';
                status.style.borderColor = 'var(--danger)';
                status.style.background = 'rgba(255, 69, 58, 0.1)';
            };
        };

        const renderDashboard = (p) => {
            // Overview
            document.getElementById('p-id').textContent = p.id;
            document.getElementById('p-client').textContent = p.name;
            document.getElementById('p-type').textContent = p.projectType;
            document.getElementById('p-location').textContent = p.location;
            document.getElementById('p-price').textContent = `$${p.price.toLocaleString()}`;

            // Tracker
            const tracker = document.getElementById('tracker-container');
            tracker.innerHTML = '';
            
            let activeIdx = STEPS.indexOf(p.status);
            if (activeIdx === -1) activeIdx = 0;

            STEPS.forEach((step, idx) => {
                const el = document.createElement('div');
                el.className = `step ${idx < activeIdx ? 'completed' : (idx === activeIdx ? 'active' : '')}`;
                
                let icon = `<div class="step-indicator"></div>`;
                if (idx < activeIdx) {
                    icon = `<div class="step-indicator">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>`;
                } else if (idx === activeIdx) {
                    icon = `<div class="step-indicator">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>
                    </div>`;
                }

                el.innerHTML = `${icon}<span class="step-label">${step}</span>`;
                tracker.appendChild(el);
            });

            // Payment Actions
            const payActions = document.getElementById('payment-actions');
            payActions.innerHTML = '';

            if (p.finalPaid) {
                payActions.innerHTML = `
                    <div class="payment-status" style="color:var(--success)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <strong>Project Fully Paid</strong>
                    </div>
                `;
            } else if (!p.depositPaid) {
                 payActions.innerHTML = `
                    <button class="payment-btn" onclick="startCheckout('deposit')">
                        Pay 50% Deposit ($${(p.price/2).toLocaleString()})
                    </button>
                    <div class="payment-status">Payment required to start production</div>
                `;
            } else if (p.status === 'Final Payment Required' || activeIdx >= 8) {
                payActions.innerHTML = `
                    <button class="payment-btn" onclick="startCheckout('final')">
                        Pay Final Balance ($${(p.price/2).toLocaleString()})
                    </button>
                    <div class="payment-status">Unlock all files upon completion</div>
                `;
            } else {
                payActions.innerHTML = `
                    <div class="payment-status" style="color:var(--amber-end)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <strong>Deposit Paid</strong>
                    </div>
                    <div class="payment-status">Final balance due at delivery</div>
                `;
            }

            // Deliverables
            const container = document.getElementById('deliverables-container');
            container.innerHTML = '';

            if (!p.finalPaid) {
                // Show placeholders + Locked Overlay
                container.innerHTML = `
                    <div class="deliverable-card" style="grid-column: 1 / -1; height: 200px; display: flex; align-items: center; justify-content: center; position: relative;">
                        <div class="locked-overlay">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <span class="locked-msg">Final payment required to access your files.</span>
                        </div>
                    </div>
                `;
            } else if (p.deliverables && p.deliverables.length > 0) {
                p.deliverables.forEach(d => {
                    const card = document.createElement('div');
                    card.className = 'deliverable-card';
                    card.innerHTML = `
                        <div class="deliverable-preview" style="background-image: url('${d.preview || '/assets/video-placeholder.jpg'}')">
                             ${d.type === 'video' ? '<svg width="40" height="40" viewBox="0 0 24 24" fill="white" style="opacity:0.8"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>' : ''}
                        </div>
                        <div class="deliverable-info">
                            <span class="deliverable-title">${d.label}</span>
                            <div class="deliverable-meta">
                                <span>${d.resolution || '4K'}</span>
                                <span>•</span>
                                <span>${d.size || '---'}</span>
                            </div>
                            <a href="${d.url}" download class="download-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Download
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = `<p style="color:var(--text-muted); font-size: 0.95rem; grid-column: 1 / -1;">No deliverables uploaded yet. Check back once projects hits 'Final Review'.</p>`;
            }

            // Updates
            const updatesBox = document.getElementById('updates-container');
            updatesBox.innerHTML = '';
            const revUpdates = [...(p.updates || [])].reverse();
            
            if (revUpdates.length === 0) {
                updatesBox.innerHTML = `<p style="color:var(--text-muted); font-size: 0.95rem;">No updates yet. We'll post major milestones here.</p>`;
            } else {
                revUpdates.forEach(u => {
                    const date = new Date(u.timestamp);
                    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    
                    const el = document.createElement('div');
                    el.className = 'update-entry';
                    el.innerHTML = `
                        <div class="update-time">${dateStr}</div>
                        <div class="update-msg">${u.message}</div>
                    `;
                    updatesBox.appendChild(el);
                });
            }
        };

        const startCheckout = async (type) => {
            const btn = event.currentTarget;
            btn.textContent = 'Processing...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectId, type })
                });
                const data = await res.json();
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    throw new Error('Checkout failed');
                }
            } catch (err) {
                alert('Stripe Error: ' + err.message);
                btn.textContent = type === 'deposit' ? 'Pay Deposit' : 'Pay Final Balance';
                btn.disabled = false;
            }
        };

        const showNotification = () => {
            const n = document.getElementById('notification');
            n.style.display = 'flex';
            setTimeout(() => { n.style.display = 'none'; }, 5000);
        };

        // Initial Load
        fetchProject();

    </script>
</body>
</html>
