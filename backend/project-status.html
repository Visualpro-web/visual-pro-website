<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Pro | Client Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon-client.svg">
    <style>
        /* Apple-inspired Cinematic Theme */
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(26, 26, 28, 0.6);
            --bg-card-hover: rgba(40, 40, 45, 0.8);
            --amber-start: #FF7B00;
            --amber-end: #FFB000;
            --text-main: #F5F5F7;
            --text-muted: #86868B;
            --border-light: rgba(255, 255, 255, 0.08);
            --success: #32D74B;
            --error: #FF453A;
            --amber-glow: rgba(255, 123, 0, 0.15);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(255,123,0,0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255,176,0,0.05), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
            .card { padding: 20px; box-shadow: none; border-radius: 16px; }
            .tabs { flex-wrap: wrap; }
            .projects-grid { grid-template-columns: 1fr; }
        }

        /* Profile Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--amber-start);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--amber-start);
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 8px 24px rgba(255, 123, 0, 0.2);
            object-fit: cover;
        }

        .profile-name { font-size: 1.5rem; font-weight: 600; margin-bottom: 5px; }
        .profile-email { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-logout:hover {
            border-color: var(--amber-start);
            color: var(--amber-start);
        }

        .btn-delete-account {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--error);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            margin-top: 10px;
            width: 100%;
        }
        .btn-delete-account:hover {
            background: rgba(255, 59, 48, 0.1);
            border-color: var(--error);
        }

        /* Main Area */
        .main-area { width: 100%; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* Projects List Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .project-card:hover {
            transform: translateY(-5px);
            background: var(--bg-card-hover);
            border-color: rgba(255,123,0,0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .p-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 5px; }
        .p-id { font-size: 0.8rem; color: var(--amber-start); font-family: monospace; }
        
        .p-status {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
        }

        .p-status.completed { background: rgba(50, 215, 75, 0.1); border-color: var(--success); color: var(--success); }
        .p-status.active { background: rgba(255, 123, 0, 0.1); border-color: var(--amber-start); color: var(--amber-start); }

        /* Detail View specific styles (migrated from old project-status) */
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 24px; padding: 30px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card-title { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .card-title svg { color: var(--amber-start); }
        
        .overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .overview-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .overview-value { font-size: 1.1rem; font-weight: 500; }
        
        .tracker { display: flex; flex-direction: column; position: relative; padding-left: 5px; }
        .tracker::before { content: ''; position: absolute; top: 50px; bottom: 15px; left: 20px; width: 2px; background: var(--border-light); z-index: 0; }
        .step { display: flex; align-items: center; position: relative; z-index: 1; opacity: 0.4; transition: all 0.5s; flex-wrap: wrap; margin-bottom: 20px; }
        .step.completed { opacity: 0.8; }
        .step.active { opacity: 1; transform: translateX(5px); }
        .step-indicator { width: 32px; height: 32px; border-radius: 50%; background: #111; border: 2px solid var(--border-light); display: flex; align-items: center; justify-content: center; margin-right: 20px; flex-shrink: 0; position: relative; }
        .step.completed .step-indicator { background: rgba(50, 215, 75, 0.1); border-color: var(--success); color: var(--success); }
        
        .active-indicator { background: rgba(255,123,0,0.1) !important; border-color: var(--amber-start) !important; box-shadow: 0 0 15px rgba(255,123,0,0.3) !important; }
        .pulse-dot { width: 12px; height: 12px; background: var(--amber-end); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .pulse-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--amber-start); animation: wave-pulse 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); opacity: 0; box-sizing: content-box; }
        @keyframes wave-pulse { 0% { width: 100%; height: 100%; opacity: 0.8; } 50% { opacity: 0.4; } 100% { width: 250%; height: 250%; opacity: 0; } }
        
        .step-label { font-size: 1.05rem; font-weight: 600; flex: 1; }
        .phase-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 15px 50px; font-weight: 600; }

        .updates-timeline { display: flex; flex-direction: column; gap: 20px; }
        .update-entry { display: flex; gap: 15px; padding-bottom: 20px; border-bottom: 1px solid var(--border-light); }
        .update-entry:last-child { border-bottom: none; }
        .update-time { font-size: 0.85rem; color: var(--text-muted); min-width: 80px; padding-top: 2px; }

        .payment-btn { width: 100%; padding: 16px; border-radius: 16px; background: linear-gradient(135deg, var(--amber-start), var(--amber-end)); color: #000; border: none; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .payment-btn:hover { box-shadow: 0 10px 25px rgba(255,123,0,0.4); }
        .payment-status { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-muted); margin-top: 12px; }

        /* Manual Payment Box */
        .manual-payment-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-light);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
        }
        .bank-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .bank-detail:last-child { margin-bottom: 0; }
        .copy-btn {
            background: rgba(255, 123, 0, 0.1);
            border: 1px solid rgba(255, 123, 0, 0.2);
            color: var(--amber-start);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover { background: var(--amber-start); color: #000; }
        .upload-receipt-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light);
            color: #fff;
            border-radius: 12px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .upload-receipt-btn:hover { border-color: var(--amber-start); color: var(--amber-start); }
        .receipt-preview {
            width: 100%;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            margin-top: 10px;
            border: 1px solid var(--border-light);
        }

        /* Downloads Gallery */
        .deliverables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .deliverable-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); border-radius: 18px; overflow: hidden; position: relative; }
        .deliverable-preview { height: 160px; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border-light); background-size: cover; background-position: center; }
        .deliverable-info { padding: 15px; }
        .deliverable-title { font-weight: 600; display: block; margin-bottom: 5px; }
        .download-btn { margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; display: flex; justify-content: center; font-size: 0.9rem; }
        .download-btn:hover { background: var(--amber-start); color: #000; border-color: transparent; }
        .locked-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; padding: 20px; }

        /* Back Button */
        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--amber-start);
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--amber-start); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <div class="dashboard-container" id="dashboard" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="profile-card">
                <div id="client-avatar" class="profile-avatar"></div>
                <h2 id="client-name" class="profile-name">---</h2>
                <div id="client-email" class="profile-email">---</div>
                <button class="btn-logout" style="width: 100%;" onclick="logout()">Sign Out</button>
                <button class="btn-delete-account" onclick="deleteAccount()">Delete Account</button>
            </div>
        </div>

        <!-- Main Area: Projects List -->
        <div class="main-area" id="view-list">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h1 class="section-title" style="margin-bottom:0;">My Projects</h1>
                <button id="manage-btn" class="btn-logout" style="padding:8px 16px; border-radius:12px; cursor:pointer;" onclick="toggleManage()">Manage Projects</button>
            </div>
            
            <div class="tabs" style="display:flex; gap:15px; margin-bottom:25px; border-bottom:1px solid var(--border-light); padding-bottom:15px;">
                <button class="tab-btn active" id="tab-active" onclick="switchTab('active')" style="background:none; border:none; color:var(--amber-start); font-size:1.1rem; font-weight:600; cursor:pointer;">Active Projects</button>
                <button class="tab-btn" id="tab-completed" onclick="switchTab('completed')" style="background:none; border:none; color:var(--text-muted); font-size:1.1rem; font-weight:600; cursor:pointer;">Completed Projects (My Videos)</button>
            </div>

            <div id="completed-filters" style="display:none; margin-bottom:25px; gap:15px;">
                <input type="text" id="filter-search" placeholder="Search by name..." style="padding:10px 15px; border-radius:10px; border:1px solid var(--border-light); background:rgba(255,255,255,0.05); color:#fff; flex:1;" onkeyup="renderProjectsList()">
                <select id="filter-sort" style="padding:10px 15px; border-radius:10px; border:1px solid var(--border-light); background:var(--bg-card); color:#fff; -webkit-appearance:none; appearance:none;" onchange="renderProjectsList()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                </select>
            </div>

            <div id="manage-actions" style="display:none; margin-bottom:20px;">
                <button onclick="deleteAllProjects()" style="padding:8px 16px; background:rgba(255,58,48,0.1); border:1px solid var(--error); color:var(--error); border-radius:10px; cursor:pointer; font-weight:600;">Delete All Projects</button>
            </div>

            <div id="projects-grid" class="projects-grid">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Main Area: Project Detail -->
        <div class="main-area" id="view-detail" style="display: none;">
            <div class="back-nav" onclick="closeDetail()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Projects
            </div>
            
            <div class="detail-grid">
                <!-- Main Col -->
                <div>
                    <!-- Final Video Container -->
                    <div id="final-video-container" style="display:none; margin-bottom:30px;"></div>

                    <!-- Deliverables -->
                    <div class="card">
                        <div class="card-header"><div class="card-title">Project Deliverables</div></div>
                        <div class="deliverables-grid" id="deliverables-container"></div>
                    </div>

                    <!-- Updates -->
                    <div class="card">
                        <div class="card-header"><div class="card-title">Project Updates</div></div>
                        <div class="updates-timeline" id="updates-container"></div>
                    </div>
                </div>

                <!-- Side Col -->
                <div>
                    <!-- Payment -->
                    <div class="card" style="background: linear-gradient(135deg, rgba(40,40,42,0.6), rgba(20,20,22,0.6))">
                        <div class="card-title">Payment Status</div>
                        <span id="p-price" style="font-size: 2rem; font-weight: 700; margin:10px 0; display:block;">$0.00</span>
                        <div id="payment-actions"></div>
                    </div>
                    
                    <!-- Tracker -->
                    <div class="card">
                        <div class="card-title" style="margin-bottom: 25px;">Project Tracker</div>
                        <div class="tracker" id="tracker-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STEPS = [
            'Request Submitted', 'Meeting Scheduled', 'Proposal Sent', 
            'Awaiting Approval', 'Deposit Paid', 'Production', 
            'Editing', 'Review', 'Completed'
        ];

        let globalProjects = [];
        let sseConnection = null;

        function initSSE() {
            if (sseConnection) return;
            sseConnection = new EventSource('/api/events');
            sseConnection.addEventListener('project_updated', (e) => {
                // When an update comes, refresh the client view
                initDashboard();
            });
            sseConnection.onerror = () => {
                 sseConnection.close();
                 sseConnection = null;
                 setTimeout(initSSE, 3000); // Reconnect in 3s
            };
        }

        async function initDashboard() {
            const token = localStorage.getItem('vp_token');
            if (!token) { window.location.href = '/portal'; return; }

            try {
                // Fetch Profile
                const profileRes = await fetch('/api/client/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!profileRes.ok) { localStorage.removeItem('vp_token'); window.location.href = '/portal'; return; }
                const user = await profileRes.json();
                
                document.getElementById('client-name').textContent = user.name;
                document.getElementById('client-email').textContent = user.email;
                const avatarEl = document.getElementById('client-avatar');
                if(user.profileImage) avatarEl.innerHTML = `<img src="${user.profileImage}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.onerror=null; this.parentElement.innerHTML='${user.name.charAt(0).toUpperCase()}';">`;
                else avatarEl.innerHTML = user.name.charAt(0).toUpperCase();

                // Fetch Projects
                const projRes = await fetch('/api/client/projects', { headers: { 'Authorization': `Bearer ${token}` } });
                globalProjects = await projRes.json();
                
                // If a project is currently open in detail view, we should keep it open and update the UI
                const currentViewDetail = document.getElementById('view-detail').style.display;
                if (currentViewDetail === 'block') {
                    // Try to find the matching project ID that is currently open
                    const activeProjectId = document.querySelector('.p-id') ? document.querySelector('.p-id').innerText : null; // Quick hack or we can track index later. Actually we don't have active ID saved easily.
                }

                renderProjectsList();

                // If a project detail is open, re-render it
                const detailOpen = document.getElementById('view-detail').style.display === 'block';
                if (detailOpen && window.currentOpenProjectIdx !== undefined) {
                    openDetail(window.currentOpenProjectIdx);
                }

                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';

                initSSE();

            } catch(e) { console.error(e); }
        }


        let currentTab = 'active';
        let isManageMode = false;

        function toggleManage() {
            isManageMode = !isManageMode;
            document.getElementById('manage-btn').style.background = isManageMode ? 'var(--amber-start)' : 'transparent';
            document.getElementById('manage-btn').style.color = isManageMode ? '#000' : 'var(--text-main)';
            document.getElementById('manage-actions').style.display = isManageMode ? 'block' : 'none';
            renderProjectsList();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-active').style.color = tab === 'active' ? 'var(--amber-start)' : 'var(--text-muted)';
            document.getElementById('tab-completed').style.color = tab === 'completed' ? 'var(--amber-start)' : 'var(--text-muted)';
            document.getElementById('completed-filters').style.display = tab === 'completed' ? 'flex' : 'none';
            renderProjectsList();
        }

        function renderProjectsList() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            
            let filteredProjects = globalProjects.filter(p => !p.hiddenFromClient);

            if (currentTab === 'active') {
                filteredProjects = filteredProjects.filter(p => !['Completed', 'Project Cancelled', 'Project Rejected'].includes(p.status));
            } else {
                filteredProjects = filteredProjects.filter(p => p.status === 'Completed');
                
                // Completed Filters
                const searchTerm = document.getElementById('filter-search').value.toLowerCase();
                if (searchTerm) {
                    filteredProjects = filteredProjects.filter(p => (p.projectTitle || p.name).toLowerCase().includes(searchTerm));
                }
                const sortOrder = document.getElementById('filter-sort').value;
                filteredProjects.sort((a,b) => sortOrder === 'newest' ? new Date(b.createdAt) - new Date(a.createdAt) : new Date(a.createdAt) - new Date(b.createdAt));
            }

            if(filteredProjects.length === 0) {
                grid.innerHTML = `<p style="color:var(--text-muted);">No ${currentTab} projects found.</p>`;
                return;
            }

            filteredProjects.forEach((p) => {
                const isCompleted = p.status === 'Completed';
                const isActive = !['Completed', 'Project Cancelled', 'Project Rejected'].includes(p.status);
                const index = globalProjects.findIndex(proj => proj.id === p.id); // for open detail

                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-card-header">
                        <div>
                            <div class="p-title">${p.projectTitle || p.name}</div>
                            <div class="p-id">${p.id}</div>
                        </div>
                        ${isManageMode ? `<button onclick="deleteProject('${p.id}', event)" style="background:rgba(255,58,48,0.1); color:var(--error); border:1px solid var(--error); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:0.8rem; z-index:10; position:relative;">Delete</button>` : ''}
                    </div>
                    <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:10px;">${p.projectType || 'Cinematic Video Production'}</div>
                    <div class="p-status ${isCompleted ? 'completed' : isActive ? 'active' : ''}">${p.status}</div>
                    ${isCompleted && p.finalVideoUrl ? `<button onclick="openDetail(${index}); event.stopPropagation();" style="margin-top:15px; width:100%; padding:10px; border-radius:10px; border:1px solid var(--border-light); background:rgba(255,123,0,0.1); color:var(--amber-start); cursor:pointer; font-weight:600; display:flex; align-items:center; justify-content:center; gap:8px;" onmouseover="this.style.background='var(--amber-start)'; this.style.color='#000';" onmouseout="this.style.background='rgba(255,123,0,0.1)'; this.style.color='var(--amber-start)';"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Watch Final Video</button>` : ''}
                `;
                if(!isManageMode) card.onclick = () => openDetail(index);
                else card.style.cursor = 'default';
                
                grid.appendChild(card);
            });
        }

        function openDetail(index) {
            window.currentOpenProjectIdx = index;
            const p = globalProjects[index];
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';

            // Prices
            const basePrice = p.price || 0;
            const discount = p.discount || 0;
            const effectivePrice = Math.max(0, basePrice - discount);
            
            let priceHtml = `$${basePrice.toLocaleString()}`;
            if (discount > 0) {
                priceHtml = `<span style="text-decoration:line-through; font-size:1.2rem; color:var(--text-muted); margin-right:10px;">$${basePrice.toLocaleString()}</span> <span style="color:var(--success)">$${effectivePrice.toLocaleString()}</span>`;
            }
            document.getElementById('p-price').innerHTML = priceHtml;
            
            // Payment Actions
            const payActions = document.getElementById('payment-actions');
            if (p.finalPaid) {
                payActions.innerHTML = `<div class="payment-status" style="color:var(--success)"><strong>Project Fully Paid</strong></div>`;
            } else if (p.status === 'Deposit Paid' || p.status === 'Review' || p.status === 'Final Payment Required' || p.status === 'Production') {
                const isDeposit = p.status === 'Deposit Paid' || p.status === 'Production';
                const amount = isDeposit ? (effectivePrice / 2) : (effectivePrice / 2);
                const hasReceipt = isDeposit ? p.depositReceipt : p.finalReceipt;

                // Adjust wording based on new status
                let msg = '';
                if(p.status === 'Deposit Paid' || p.status === 'Production') msg = '50% Deposit Required';
                else msg = 'Final Payment Required';

                let html = `
                    <div style="margin-bottom:15px; font-weight:600; color:var(--amber-start);">
                        ${msg}: $${amount.toLocaleString()}
                    </div>
                    <div class="manual-payment-box">
                        <div class="bank-detail">
                            <div><span class="overview-label">Banco:</span> <span id="bank-name">Qik Banco Digital Dominicano</span></div>
                            <button class="copy-btn" onclick="copyText('Qik Banco Digital Dominicano')">Copy</button>
                        </div>
                        <div class="bank-detail">
                            <div><span class="overview-label">Titular:</span> <span id="bank-holder">Emmanuel Santiago Vasquez</span></div>
                            <button class="copy-btn" onclick="copyText('Emmanuel Santiago Vasquez')">Copy</button>
                        </div>
                        <div class="bank-detail">
                            <div><span class="overview-label">Cédula:</span> <span id="bank-id">40210049025</span></div>
                            <button class="copy-btn" onclick="copyText('40210049025')">Copy</button>
                        </div>
                        <div class="bank-detail">
                            <div><span class="overview-label">Cuenta:</span> <span id="bank-acc">1004111768 (Ahorros)</span></div>
                            <button class="copy-btn" onclick="copyText('1004111768')">Copy</button>
                        </div>
                    </div>
                `;

                if (hasReceipt) {
                    html += `
                        <div class="payment-status" style="color:var(--amber-end); margin-top:20px;">
                            <strong>Receipt Uploaded</strong>
                        </div>
                        <img src="${hasReceipt}" class="receipt-preview">
                        <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Waiting for admin verification...</p>
                    `;
                } else {
                    html += `
                        <input type="file" id="receipt-upload" accept="image/*" style="display:none;" onchange="handleReceiptUpload('${p.id}')">
                        <button class="upload-receipt-btn" onclick="document.getElementById('receipt-upload').click()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            Upload Payment Receipt
                        </button>
                        <p style="font-size:0.75rem; color:var(--text-muted); text-align:center; margin-top:10px;">Please upload a screenshot of the transfer.</p>
                    `;
                }
                payActions.innerHTML = html;
            } else if (p.depositPaid && !p.finalPaid) {
                payActions.innerHTML = `<div class="payment-status" style="color:var(--amber-end)"><strong>Deposit Paid ($${(effectivePrice/2).toLocaleString()})</strong></div>`;
            } else {
                payActions.innerHTML = `<div class="payment-status">Payment information will appear here once the project is accepted.</div>`;
            }

            // Tracker
            const tracker = document.getElementById('tracker-container');
            tracker.innerHTML = '';
            
            const currentStepName = p.status;
            let overlabel = `Next Step: ${currentStepName}`;
            if(p.status === 'Meeting Scheduled' && p.meetingDate) {
                // If the user already picked a date, show Upcoming. If not, Next Step.
                overlabel = `Upcoming: Meeting on ${new Date(p.meetingDate).toLocaleString()}`;
            }

            tracker.innerHTML = `
                <div style="font-size:1.15rem; color:var(--amber-start); font-weight:600; margin-bottom:15px; padding-left:20px;">
                    ${overlabel}
                </div>
            `;

            let activeIdx = Math.max(0, STEPS.indexOf(p.status));
            
            const phases = [
                { name: 'Phase 1 — Inquiry', steps: ['Request Submitted', 'Meeting Scheduled'] },
                { name: 'Phase 2 — Approval', steps: ['Proposal Sent', 'Awaiting Approval', 'Deposit Paid'] },
                { name: 'Phase 3 — Production', steps: ['Production', 'Editing'] },
                { name: 'Phase 4 — Delivery', steps: ['Review', 'Completed'] }
            ];

            let globalStepIdx = 0;
            phases.forEach(phase => {
                const phaseBlock = document.createElement('div');
                phaseBlock.className = 'phase-group';
                phaseBlock.innerHTML = `<div class="phase-title" style="background:var(--bg-card); display:inline-block; padding-right:10px; position:relative; z-index:2;">${phase.name}</div>`;
                
                phase.steps.forEach(stepStr => {
                    const el = document.createElement('div');
                    let stepStateClass = '';
                    let iconHtml = '';

                    if (p.status === 'Completed' || globalStepIdx < activeIdx) {
                        stepStateClass = 'completed';
                        iconHtml = `<div class="step-indicator">✓</div>`;
                    } else if (globalStepIdx === activeIdx) {
                        stepStateClass = 'active';
                        iconHtml = `
                            <div class="step-indicator active-indicator">
                                <div class="pulse-ring"></div>
                                <div class="pulse-dot"></div>
                            </div>
                        `;
                    } else {
                        iconHtml = `<div class="step-indicator"></div>`;
                    }

                    el.className = `step ${stepStateClass}`;
                    el.innerHTML = `${iconHtml}<span class="step-label">${stepStr}</span>`;
                    
                    if (stepStateClass === 'active') {
                        if (stepStr === 'Meeting Scheduled') {
                            el.innerHTML += `
                                <div style="margin-top:15px; width:100%; margin-left:52px; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px; border:1px solid var(--border-light);">
                                    ${p.meetingDate ? 
                                        `<div style="color:var(--success); font-weight:600;">Meeting Set: ${new Date(p.meetingDate).toLocaleString()}</div>
                                         <p style="font-size:0.85rem; color:var(--text-muted); margin:5px 0 0 0;">An admin will join you shortly. We also emailed you an .ics calendar invite.</p>`
                                     : 
                                        `<label style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:10px;">Pick a Date & Time</label>
                                         <input type="datetime-local" id="meeting-date" style="padding:12px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border-light); color:#fff; width:100%; box-sizing:border-box; margin-bottom:15px; font-family:inherit;">
                                         <button class="payment-btn" style="margin-top:0; padding:12px;" onclick="scheduleMeeting('${p.id}')">Schedule Meeting</button>`
                                    }
                                </div>
                            `;
                        } else if (stepStr === 'Awaiting Approval') {
                            el.innerHTML += `
                                <div style="margin-top:15px; width:100%; margin-left:52px; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px; border:1px solid var(--border-light);">
                                    <p style="font-size:0.9rem; color:var(--text-main); margin:0 0 10px 0; font-weight:600;">Action Required: Review Your Proposal</p>
                                    <p style="font-size:0.85rem; color:var(--text-muted); margin:0 0 15px 0;">Please review the proposal sent to your email. Click below to accept the project and proceed to the deposit.</p>
                                    <div style="display:flex; gap:10px;">
                                        <button class="payment-btn" style="margin-top:0; padding:10px; flex:1;" onclick="handleClientDecision('${p.id}', 'accept')">Accept Project</button>
                                        <button class="btn-logout" style="margin-top:0; padding:10px; flex:1; width:auto; border-radius:16px; border:1px solid var(--error); color:var(--error); background:rgba(255,69,58,0.05); cursor:pointer;" onclick="handleClientDecision('${p.id}', 'decline')">Decline</button>
                                    </div>
                                </div>
                            `;
                        } else if (stepStr === 'Deposit Paid') {
                            el.innerHTML += `
                                <div style="margin-top:15px; width:100%; margin-left:52px; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px; border:1px solid var(--border-light);">
                                    ${p.depositReceipt ?
                                        `<div style="color:var(--success); font-weight:600;">Receipt Uploaded.</div>
                                         <p style="font-size:0.85rem; color:var(--text-muted); margin:5px 0 0 0;">Thank you! Your project is now moving to Production automatically.</p>` 
                                      :
                                        `<p style="font-size:0.85rem; color:var(--text-muted); margin:0 0 10px 0;">Please upload your payment transfer screenshot to proceed.</p>
                                         <input type="file" id="tracker-receipt-upload" accept="image/*" style="display:none;" onchange="handleTrackerReceiptUpload('${p.id}')">
                                         <button class="payment-btn" style="margin-top:0; padding:12px;" onclick="document.getElementById('tracker-receipt-upload').click()">Upload Payment Proof</button>`
                                    }
                                </div>
                            `;
                        }
                    }

                    phaseBlock.appendChild(el);
                    globalStepIdx++;
                });
                tracker.appendChild(phaseBlock);
            });

            // Final Video System
            const videoContainer = document.getElementById('final-video-container');
            if (p.finalVideoUrl && p.status === 'Completed') {
                videoContainer.style.display = 'block';
                videoContainer.innerHTML = `
                    <div class="card" style="margin-bottom:0; background:linear-gradient(to bottom, var(--bg-card), rgba(0,0,0,0.8));">
                        <div class="card-header"><div class="card-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Final Video Presentation</div></div>
                        <video src="${p.finalVideoUrl}" controls style="width:100%; border-radius:15px; border:1px solid var(--border-light); background:#000; outline:none;"></video>
                        <a href="${p.finalVideoUrl}" download class="download-btn" style="margin-top:20px; text-decoration:none;">Download High-Res Video</a>
                    </div>
                `;
            } else {
                videoContainer.style.display = 'none';
                videoContainer.innerHTML = '';
            }

            // Deliverables
            const container = document.getElementById('deliverables-container');
            if (!p.finalPaid && !p.depositPaid) {
                container.innerHTML = `<p style="color:var(--text-muted);">Deliverables will appear here once ready.</p>`;
            } else if (!p.finalPaid) {
                container.innerHTML = `<div class="locked-overlay" style="position:relative; width:100%; height:150px; border-radius:15px; display:flex; align-items:center; justify-content:center; text-align:center;"><span class="locked-msg" style="padding:0 20px;">Final payment required to access your files.</span></div>`;
            } else if (p.deliverables && p.deliverables.length > 0) {
                container.innerHTML = '';
                p.deliverables.forEach(d => {
                    const card = document.createElement('div');
                    card.className = 'deliverable-card';
                    card.innerHTML = `
                        <div class="deliverable-info">
                            <span class="deliverable-title">${d.label}</span>
                            <div style="font-size:0.8rem; color:var(--text-muted)">${d.size || 'File'}</div>
                            <a href="${d.url}" download class="download-btn">Download File</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p style="color:var(--text-muted);">No deliverables uploaded yet.</p>';
            }

            // Updates
            const updatesBox = document.getElementById('updates-container');
            updatesBox.innerHTML = '';
            const revUpdates = [...(p.updates || [])].reverse();
            if(revUpdates.length === 0) updatesBox.innerHTML = '<p style="color:var(--text-muted);">No updates yet.</p>';
            else revUpdates.forEach(u => {
                const d = new Date(u.timestamp).toLocaleDateString();
                updatesBox.innerHTML += `<div class="update-entry"><div class="update-time">${d}</div><div class="update-msg">${u.message}</div></div>`;
            });
        }

        function closeDetail() {
            document.getElementById('view-detail').style.display = 'none';
            document.getElementById('view-list').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('vp_token');
            window.location.href = '/portal';
        }

        async function deleteAccount() {
            const confirmed = confirm("Are you sure you want to permanently delete your account? This action cannot be undone.");
            if (!confirmed) return;

            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch('/api/client/me', {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert("Your account has been successfully deleted.");
                    logout();
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to delete account");
                }
            } catch(e) {
                console.error(e);
                alert("An error occurred while deleting your account.");
            }
        }

        function copyText(val) {
            navigator.clipboard.writeText(val);
            alert('Copied to clipboard: ' + val);
        }

        async function handleReceiptUpload(projectId) {
            const fileInput = document.getElementById('receipt-upload');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('paymentReceipt', fileInput.files[0]);

            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch(`/api/projects/${projectId}/receipt`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (res.ok) {
                    alert('Receipt uploaded successfully! Admin will verify it shortly.');
                    // Refresh current project view
                    const data = await res.json();
                    // Local update
                    const p = globalProjects.find(pro => pro.id === projectId);
                    if(p.status === 'Deposit Paid') {
                        p.depositReceipt = data.receiptUrl;
                        p.status = 'Production'; // Auto-advance front-end
                    }
                    else p.finalReceipt = data.receiptUrl;
                    
                    // Re-render
                    const idx = globalProjects.findIndex(pro => pro.id === projectId);
                    openDetail(idx);
                } else {
                    const data = await res.json();
                    alert(data.error || 'Upload failed');
                }
            } catch(e) {
                console.error(e);
                alert('Error uploading receipt');
            }
        }

        async function handleTrackerReceiptUpload(projectId) {
            const fileInput = document.getElementById('tracker-receipt-upload');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('paymentReceipt', fileInput.files[0]);

            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch(`/api/projects/${projectId}/receipt`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (res.ok) {
                    alert('Receipt uploaded successfully! Your step is now completed.');
                    const data = await res.json();
                    
                    // Local update
                    const p = globalProjects.find(pro => pro.id === projectId);
                    p.depositReceipt = data.receiptUrl;
                    p.status = 'Production'; // Auto-advance locally
                    
                    // Re-render
                    const idx = globalProjects.findIndex(pro => pro.id === projectId);
                    openDetail(idx);
                } else {
                    const data = await res.json();
                    alert(data.error || 'Upload failed');
                }
            } catch(e) {
                console.error(e);
                alert('Error uploading receipt');
            }
        }

        async function scheduleMeeting(projectId) {
            const dateInput = document.getElementById('meeting-date').value;
            if (!dateInput) {
                alert('Please select a valid date and time.');
                return;
            }

            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch(`/api/projects/${projectId}/meeting`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: new Date(dateInput).toISOString() })
                });
                
                if (res.ok) {
                    alert('Meeting scheduled successfully! We sent an invite to your email.');
                    // Local update
                    const p = globalProjects.find(pro => pro.id === projectId);
                    p.meetingDate = dateInput;
                    
                    // Re-render
                    const idx = globalProjects.findIndex(pro => pro.id === projectId);
                    openDetail(idx);
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to schedule meeting');
                }
            } catch(e) {
                console.error(e);
                alert('Error scheduling meeting');
            }
        }

        async function handleClientDecision(id, decision) {
            if(!confirm(`Are you sure you want to ${decision} this project?`)) return;
            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch(`/api/projects/${id}/decision`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decision })
                });
                if(res.ok) {
                    alert(`Project ${decision}ed successfully!`);
                    initDashboard();
                } else {
                    alert('Failed to process decision');
                }
            } catch(e) { console.error(e); }
        }

        async function deleteProject(id, event) {
            event.stopPropagation();
            if(!confirm('Are you sure you want to delete this project?')) return;
            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch(`/api/projects/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                if(res.ok) { initDashboard(); }
            } catch(e) { console.error(e); }
        }

        async function deleteAllProjects() {
            if(!confirm('WARNING: Are you sure you want to delete ALL your projects? This cannot be undone.')) return;
            try {
                const token = localStorage.getItem('vp_token');
                const res = await fetch(`/api/projects/all`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                if(res.ok) { alert('All projects removed'); initDashboard(); }
            } catch(e) { console.error(e); }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
