<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Pro | Client Portal Login</title>
    <style>
        /* Apple-inspired Cinematic Theme */
        :root {
            --bg-dark: #050505;
            --bg-card: rgba(26, 26, 28, 0.6);
            --amber-start: #FF7B00;
            --amber-end: #FFB000;
            --text-main: #F5F5F7;
            --text-muted: #86868B;
            --border-light: rgba(255, 255, 255, 0.08);
            --danger: #FF453A;
            --amber-glow: rgba(255, 123, 0, 0.15);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center 20%, rgba(255,123,0,0.06), transparent 60%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 60px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 40px rgba(255, 123, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 { margin: 0 0 10px 0; font-weight: 700; font-size: 2.22rem; letter-spacing: -1px; }
        p.subtitle { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.5; }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: rgba(0,0,0,0.5);
            color: #fff;
            box-sizing: border-box;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-group input:focus {
            border-color: var(--amber-start);
            background: rgba(255, 123, 0, 0.03);
            box-shadow: 0 0 20px rgba(255, 123, 0, 0.1);
        }
        
        #project-id {
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-amber {
            width: 100%;
            padding: 18px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--amber-start), var(--amber-end));
            color: #000;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-amber:hover {
            box-shadow: 0 15px 35px rgba(255, 123, 0, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-amber:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.95rem;
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 69, 58, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 58, 0.2);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer-links {
            margin-top: 40px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--amber-end);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Client <span class="text-gradient">Portal</span></h1>
        <p class="subtitle">Access your premium project updates and deliverables.</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="e.g. name@company.com" required>
            </div>
            
            <div class="input-group">
                <label for="project-id">Project ID</label>
                <input type="text" id="project-id" placeholder="e.g. VP-1024" required autocomplete="off">
            </div>

            <button type="submit" class="btn-amber" id="submit-btn">Login to Portal</button>
            <div class="error-msg" id="error-msg">Invalid email or Project ID. Please try again.</div>
        </form>
        
        <div class="footer-links">
            <a href="/">&larr; Back to Visual Pro</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const projectInput = document.getElementById('project-id');
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            const email = emailInput.value.trim();
            let pId = projectInput.value.trim().toUpperCase();
            
            if(!email || !pId) return;

            // Auto-format ID if they forgot the prefix
            if(/^\d{4,}$/.test(pId)) pId = `VP-${pId}`;
            projectInput.value = pId;

            submitBtn.textContent = 'Authenticating...';
            submitBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/client-portal/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, projectId: pId })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Redirect to the dashboard with the valid project ID
                    window.location.href = `/project-status?id=${data.id}`;
                } else {
                    const errData = await res.json();
                    errorMsg.textContent = errData.error || 'Invalid credentials.';
                    errorMsg.style.display = 'block';
                    submitBtn.textContent = 'Login to Portal';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.textContent = 'Login to Portal';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
